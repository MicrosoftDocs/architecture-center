name: Polyglot persistence with Azure Cosmos DB and Azure SQL Database
summary: Learn how to use Azure Cosmos DB and Azure SQL Database together in a polyglot persistence architecture. Domain-driven microservices assign each database to the workload it handles best. Azure SQL Database manages structured, transactional data that requires ACID compliance and relational integrity. Azure Cosmos DB handles high-volume, schema-flexible, or globally distributed data that requires low-latency access and horizontal scalability.
